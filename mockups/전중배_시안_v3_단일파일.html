<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전중배 — 시안 v3 (실로고 · iPhone 톤)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --navy:#002F6C; --navy2:#0B3F86; --blue:#3B82F6; --bg-blue:#EFF6FF;
  --red:#E11D2A; --red-soft:#FCEBED;
  --ios-bg:#F2F2F7; --card:#fff;
  --sep:rgba(60,60,67,.12); --hair:rgba(60,60,67,.18);
  --label:#1C1C1E; --label2:#8A8A8E; --label3:#B0B0B6;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;}
body{background:#E7EAF0;color:var(--label);padding:34px 18px 70px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

.head{max-width:520px;margin:0 auto 26px;text-align:center;}
.head h1{font-size:21px;font-weight:700;color:var(--navy);letter-spacing:-0.5px;}
.head p{font-size:13px;color:var(--label2);margin-top:8px;line-height:1.65;}
.head .pill{display:inline-block;margin-top:12px;font-size:11.5px;font-weight:600;color:var(--navy);background:#fff;border:1px solid var(--sep);padding:6px 12px;border-radius:20px;}

.row3{display:flex;gap:30px;justify-content:center;align-items:flex-start;flex-wrap:wrap;max-width:1180px;margin:0 auto;}
.item{display:flex;flex-direction:column;align-items:center;gap:12px;}
.item .cap{font-size:12.5px;font-weight:700;color:var(--label2);}

/* iPhone frame */
.phone{width:340px;height:736px;background:#000;border-radius:46px;padding:12px;box-shadow:0 22px 50px rgba(2,32,71,.22),0 6px 14px rgba(2,32,71,.12);position:relative;}
.notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:30px;background:#000;border-radius:0 0 18px 18px;z-index:99;}
.screen{width:100%;height:100%;border-radius:34px;overflow:hidden;position:relative;display:flex;flex-direction:column;background:#fff;}
.sb{flex:0 0 auto;height:46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 7px;font-size:14px;font-weight:600;letter-spacing:-0.2px;}
.sb .r{display:flex;gap:6px;align-items:center;}
.sb .r svg{width:17px;height:13px;}
.sb.dark{color:#fff;} .sb.light{color:var(--label);}

/* ===== LOGIN ===== */
.login{flex:1;min-height:0;display:flex;flex-direction:column;background:linear-gradient(165deg,var(--navy2),var(--navy) 72%);position:relative;overflow:hidden;}
.login .glow{position:absolute;border-radius:50%;}
.login .g1{width:240px;height:240px;top:-70px;right:-70px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);}
.login .g2{width:200px;height:200px;top:120px;left:-80px;background:radial-gradient(circle,rgba(225,29,42,.16),transparent 70%);}
.login-hero{flex:0 0 auto;padding:18px 30px 26px;text-align:center;position:relative;z-index:2;}
.login-hero img{width:88px;height:88px;filter:drop-shadow(0 6px 16px rgba(0,0,0,.25));}
.login-hero h1{font-size:25px;font-weight:600;color:#fff;line-height:1.32;letter-spacing:-0.8px;margin-top:14px;}
.login-hero h1 b{font-weight:800;color:#fff;}
.login-hero p{font-size:13px;color:rgba(255,255,255,.72);margin-top:9px;font-weight:400;}
.sheet{flex:1;min-height:0;background:#fff;border-radius:30px 30px 0 0;margin-top:auto;padding:26px 24px 20px;display:flex;flex-direction:column;box-shadow:0 -10px 30px rgba(0,0,0,.12);}
.fld{margin-bottom:13px;}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--label2);margin-bottom:7px;}
.fld input{width:100%;height:50px;border:none;background:var(--ios-bg);border-radius:13px;padding:0 15px;font-size:14px;color:var(--label);}
.fld input:focus{outline:2px solid rgba(0,47,108,.25);background:#fff;}
.lrow{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--label2);margin:4px 0 18px;}
.lrow label{display:flex;align-items:center;gap:6px;} .lrow input{accent-color:var(--navy);width:15px;height:15px;}
.lrow .f{color:var(--navy);font-weight:600;}
.btn{width:100%;height:52px;border:none;border-radius:14px;font-size:15.5px;font-weight:700;cursor:pointer;letter-spacing:-0.3px;}
.btn-nav{background:var(--navy);color:#fff;box-shadow:0 8px 20px rgba(0,47,108,.22);}
.signup{text-align:center;font-size:13px;color:var(--label2);margin-top:18px;}
.signup a{color:var(--navy);font-weight:700;}
.trust{display:flex;justify-content:center;gap:22px;margin-top:auto;padding-top:18px;}
.trust .t{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--label2);}
.trust .t svg{width:15px;height:15px;stroke:var(--navy);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}

/* ===== LIST ===== */
.list{flex:1;min-height:0;display:flex;flex-direction:column;background:var(--ios-bg);}
.lgnav{flex:0 0 auto;background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(18px);-webkit-backdrop-filter:saturate(180%) blur(18px);padding:4px 20px 12px;border-bottom:.5px solid var(--sep);}
.lgnav .top{display:flex;align-items:center;justify-content:space-between;}
.lgnav .brand{display:flex;align-items:center;gap:8px;}
.lgnav .brand img{width:26px;height:26px;}
.lgnav .brand span{font-size:14px;font-weight:800;color:var(--navy);letter-spacing:-0.5px;}
.bell{position:relative;width:38px;height:38px;border-radius:50%;background:var(--ios-bg);display:flex;align-items:center;justify-content:center;}
.bell svg{width:20px;height:20px;stroke:var(--navy);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bell .d{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--red);border:1.5px solid #fff;}
.ltitle{font-size:30px;font-weight:800;color:var(--label);letter-spacing:-1px;margin-top:8px;}
.filters{flex:0 0 auto;display:flex;gap:8px;padding:12px 16px;overflow-x:auto;background:var(--ios-bg);}
.filters::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;font-size:13px;font-weight:600;padding:9px 15px;border-radius:22px;background:#fff;color:var(--label2);border:.5px solid var(--sep);display:flex;align-items:center;gap:5px;}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.cards{flex:1;min-height:0;overflow-y:auto;padding:4px 16px 16px;display:flex;flex-direction:column;gap:13px;}
.cards::-webkit-scrollbar{display:none;}
.jc{background:var(--card);border-radius:20px;padding:17px;box-shadow:0 1px 3px rgba(2,32,71,.06),0 6px 18px rgba(2,32,71,.04);}
.jc.prio{box-shadow:0 0 0 1.5px var(--red),0 8px 20px rgba(225,29,42,.10);}
.jc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.jc-date{font-size:12.5px;font-weight:600;color:var(--label2);}
.jc-region{font-size:17px;font-weight:800;color:var(--label);margin-top:4px;letter-spacing:-0.5px;}
.pp{font-size:11px;font-weight:800;padding:6px 11px;border-radius:20px;flex:0 0 auto;}
.pp.prio{background:var(--red);color:#fff;}
.pp.normal{background:var(--bg-blue);color:var(--navy);}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0;}
.tags span{font-size:11.5px;font-weight:600;color:var(--label2);background:var(--ios-bg);padding:6px 10px;border-radius:8px;}
.jc-meta{display:flex;justify-content:space-between;align-items:flex-end;border-top:.5px solid var(--sep);padding-top:13px;}
.jc-equip{font-size:12px;color:var(--label2);font-weight:500;}
.jc-amt{font-size:18px;font-weight:800;color:var(--navy);letter-spacing:-0.6px;}
.cd{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--red);margin-top:12px;background:var(--red-soft);padding:9px 12px;border-radius:11px;}
.cd .t{font-variant-numeric:tabular-nums;font-size:13px;letter-spacing:.5px;}
/* 배차완료 — 크게 재디자인 */
.jc.done{position:relative;background:#F4F5F8;overflow:hidden;}
.jc.done .inner{filter:grayscale(1);opacity:.32;}
.done-cover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;background:rgba(244,245,248,.35);backdrop-filter:blur(1.5px);}
.done-cover .ck{width:46px;height:46px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(0,47,108,.28);}
.done-cover .ck svg{width:25px;height:25px;stroke:#fff;fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;}
.done-cover .tx{font-size:20px;font-weight:800;color:var(--navy);letter-spacing:1px;}
.done-cover .sub{font-size:11.5px;font-weight:600;color:var(--label2);margin-top:-4px;}
.fab{position:absolute;right:18px;bottom:96px;width:58px;height:58px;border-radius:19px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 26px rgba(0,47,108,.34);font-size:30px;font-weight:300;}
.tabbar{flex:0 0 auto;background:rgba(255,255,255,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:.5px solid var(--sep);display:flex;padding:10px 4px 22px;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.tab svg{width:23px;height:23px;stroke:var(--label3);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.tab span{font-size:10px;font-weight:600;color:var(--label3);}
.tab.on svg{stroke:var(--navy);} .tab.on span{color:var(--navy);}

/* ===== DETAIL ===== */
.detail{flex:1;min-height:0;display:flex;flex-direction:column;background:#fff;}
.map{flex:0 0 auto;height:172px;background:linear-gradient(135deg,#d4e1f2,#eef3fa);position:relative;}
.map .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,47,108,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,47,108,.05) 1px,transparent 1px);background-size:28px 28px;}
.map .pin{position:absolute;top:64px;left:50%;transform:translateX(-50%) rotate(-45deg);width:34px;height:34px;border-radius:50% 50% 50% 0;background:var(--red);box-shadow:0 8px 18px rgba(225,29,42,.45);}
.map .pin::after{content:"";position:absolute;top:11px;left:11px;width:12px;height:12px;border-radius:50%;background:#fff;}
.dback{position:absolute;top:14px;left:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.dback svg{width:20px;height:20px;stroke:var(--navy);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.dbody{flex:1;min-height:0;overflow-y:auto;padding-bottom:8px;}
.dbody::-webkit-scrollbar{display:none;}
.dhead{padding:18px 20px 4px;}
.dhead .pp{display:inline-block;margin-bottom:10px;}
.dhead h2{font-size:22px;font-weight:800;color:var(--label);letter-spacing:-0.7px;}
.dhead .loc{font-size:13px;color:var(--label2);margin-top:6px;font-weight:500;}
.banner{display:flex;align-items:center;gap:11px;background:var(--red-soft);margin:16px 16px 0;padding:13px 14px;border-radius:15px;}
.banner .i{width:34px;height:34px;border-radius:11px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto;}
.banner .x{font-size:12px;font-weight:600;color:#a01b25;line-height:1.45;}
.banner .x b{font-variant-numeric:tabular-nums;font-size:13.5px;font-weight:800;}
.amt{margin:16px 16px 0;background:var(--ios-bg);border-radius:18px;padding:18px;}
.amt .l{font-size:12px;font-weight:600;color:var(--label2);}
.amt .b{font-size:27px;font-weight:800;color:var(--navy);letter-spacing:-1px;margin-top:4px;}
.amt .ref{display:flex;justify-content:space-between;font-size:12px;color:var(--label2);margin-top:13px;border-top:.5px solid var(--sep);padding-top:13px;}
.amt .ref b{color:var(--red);font-weight:800;}
.grp{margin:16px 16px 0;background:var(--card);border:.5px solid var(--sep);border-radius:18px;overflow:hidden;}
.grp .gr{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px;font-size:13.5px;gap:14px;border-bottom:.5px solid var(--sep);}
.grp .gr:last-child{border-bottom:none;}
.grp .k{color:var(--label2);font-weight:500;flex:0 0 auto;}
.grp .v{color:var(--label);font-weight:600;text-align:right;line-height:1.5;}
.dcta{flex:0 0 auto;padding:12px 16px 26px;border-top:.5px solid var(--sep);display:flex;gap:10px;background:rgba(255,255,255,.94);backdrop-filter:blur(18px);}
.btn-sub{flex:1;height:54px;border-radius:15px;border:none;background:var(--ios-bg);color:var(--navy);font-size:14.5px;font-weight:700;}
.btn-prio{flex:1.4;height:54px;border-radius:15px;border:none;background:var(--red);color:#fff;font-size:14.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;box-shadow:0 8px 20px rgba(225,29,42,.26);}
.btn-prio small{font-size:10px;font-weight:600;opacity:.9;}
</style>
</head>
<body>

<div class="head">
  <h1>전중배 — 시안 v3</h1>
  <p>실제 로고 적용 · iPhone 톤으로 다듬음. 메인 타이포 굵기↓, '배차완료' 크게 재디자인.</p>
  <span class="pill">빨강 전략 = 듀얼(긴급·우선만 빨강 / 일반은 네이비)</span>
</div>

<div class="row3" id="root"></div>
