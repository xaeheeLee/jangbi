<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전중배 — 시안 v4 (3컨셉 × 3화면 / 갤럭시)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --navy:#002F6C; --navy2:#0B3F86; --blue:#3B82F6; --blue-bg:#EFF6FF;
  --red:#DC2626; --red-bg:#FEF2F2; --amber:#EA580C;
  --bg:#F7F8FA; --gray:#F1F4F8; --card:#fff;
  --bd:#E7EBF1; --bd2:#DCE2EA;
  --tx:#16181D; --tx2:#6B7280; --tx3:#A6AEB9;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;}
body{background:#E9ECF2;color:var(--tx);padding:34px 18px 70px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

.head{max-width:1180px;margin:0 auto 28px;text-align:center;}
.head h1{font-size:21px;font-weight:700;color:var(--navy);letter-spacing:-0.5px;}
.head p{font-size:13px;color:var(--tx2);margin-top:8px;line-height:1.6;}

.row3{display:flex;gap:34px;justify-content:center;align-items:flex-start;flex-wrap:wrap;max-width:1180px;margin:0 auto;}
.col{flex:0 0 auto;}
.col-h{text-align:center;margin-bottom:16px;max-width:312px;}
.col-h .n{font-size:15px;font-weight:800;color:var(--navy);}
.col-h .d{font-size:11.5px;color:var(--tx2);margin-top:4px;line-height:1.5;}
.stack{display:flex;flex-direction:column;gap:24px;}
.cap{text-align:center;font-size:12px;font-weight:700;color:var(--tx2);margin-top:10px;}

/* ===== Galaxy frame (no notch / no status bar) ===== */
.phone{width:312px;height:676px;background:#0c0d10;border-radius:32px;padding:8px;box-shadow:0 16px 40px rgba(2,32,71,.18),0 4px 12px rgba(2,32,71,.12);position:relative;}
.screen{width:100%;height:100%;border-radius:25px;overflow:hidden;position:relative;display:flex;flex-direction:column;background:#fff;}
.hole{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:#0c0d10;z-index:90;}
.scrollable{flex:1;min-height:0;overflow-y:auto;} .scrollable::-webkit-scrollbar{display:none;}
.scrollable.no::-webkit-scrollbar{display:none;}

/* shared logo */
.lg{display:flex;align-items:center;gap:8px;}
.lg img{display:block;}
.plate{background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(0,0,0,.18);}

/* shared button */
.btn{width:100%;border:none;border-radius:13px;font-weight:700;cursor:pointer;letter-spacing:-0.3px;}
.btn-navy{background:var(--navy);color:#fff;box-shadow:0 6px 16px rgba(0,47,108,.20);}
.btn-out{background:#fff;color:var(--navy);border:1.5px solid var(--bd2);}
.btn-red{background:var(--red);color:#fff;box-shadow:0 6px 16px rgba(220,38,38,.22);}

/* tags */
.tg{font-size:10.5px;font-weight:700;padding:4px 8px;border-radius:6px;background:var(--gray);color:var(--tx2);}

/* tabbar (shared look, tuned per concept via parent) */
.tabs{flex:0 0 auto;background:#fff;border-top:1px solid var(--bd);display:flex;padding:9px 2px 14px;}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.tb svg{width:22px;height:22px;stroke:var(--tx3);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.tb span{font-size:10px;font-weight:600;color:var(--tx3);}
.tb.on svg{stroke:var(--navy);} .tb.on span{color:var(--navy);font-weight:700;}

/* countdown variants */
.cd-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--amber);background:#FFF4ED;padding:5px 10px;border-radius:8px;}
.cd-pill .t{font-variant-numeric:tabular-nums;}
.ring{position:relative;width:44px;height:44px;flex:0 0 auto;}
.ring svg{transform:rotate(-90deg);}
.ring .n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--amber);}

/* map (kakao-like, neutral pin) */
.map{position:relative;background:#E9EEF3;overflow:hidden;}
.map .roads{position:absolute;inset:0;}
.map .road{position:absolute;background:#fff;}
.map .road.r1{top:46%;left:0;right:0;height:13px;}
.map .road.r2{top:0;bottom:0;left:40%;width:11px;}
.map .road.r3{top:18%;left:0;right:0;height:7px;background:#F3F6F9;}
.map .blk{position:absolute;background:#DDE5EC;border-radius:2px;}
.map .pin{position:absolute;width:26px;height:26px;border-radius:50% 50% 50% 0;background:var(--navy);transform:rotate(-45deg);box-shadow:0 4px 10px rgba(0,0,0,.25);}
.map .pin::after{content:"";position:absolute;top:8px;left:8px;width:10px;height:10px;border-radius:50%;background:#fff;}
.map .katt{position:absolute;left:8px;bottom:7px;font-size:9px;font-weight:700;color:#8b96a3;background:rgba(255,255,255,.85);padding:2px 6px;border-radius:4px;}

/* ============================================================
   CONCEPT A — 리스트형 (clean list, light)
   ============================================================ */
.cA .screen{background:#fff;}
.cA .a-login{flex:1;display:flex;flex-direction:column;padding:54px 26px 26px;}
.cA .a-login .top{text-align:center;}
.cA .a-login .top img{width:108px;height:108px;margin:0 auto;}
.cA .a-login h1{font-size:21px;font-weight:700;color:var(--tx);margin-top:18px;letter-spacing:-0.6px;line-height:1.35;}
.cA .a-login h1 b{color:var(--navy);font-weight:800;}
.cA .a-login p{font-size:12.5px;color:var(--tx2);margin-top:8px;}
.cA .a-login .form{margin-top:30px;}
.cA .fld{margin-bottom:12px;}
.cA .fld label{font-size:11.5px;font-weight:700;color:var(--tx2);display:block;margin-bottom:6px;}
.cA .fld input{width:100%;height:46px;border:1.5px solid var(--bd);background:#fff;border-radius:11px;padding:0 14px;font-size:13.5px;}
.cA .a-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--tx2);margin:6px 2px 18px;}
.cA .a-row .f{color:var(--navy);font-weight:700;}
.cA .a-login .btn{height:50px;font-size:15px;}
.cA .a-su{text-align:center;font-size:12.5px;color:var(--tx2);margin-top:16px;}
.cA .a-su a{color:var(--navy);font-weight:700;}
.cA .a-trust{display:flex;justify-content:center;gap:24px;margin-top:auto;padding-top:20px;}
.cA .a-trust .t{display:flex;flex-direction:column;align-items:center;gap:7px;font-size:10.5px;color:var(--tx2);font-weight:600;}
.cA .a-trust .ic{width:40px;height:40px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;}
.cA .a-trust svg{width:18px;height:18px;stroke:var(--navy);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
/* list */
.cA .a-hd{flex:0 0 auto;padding:18px 18px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.cA .a-hd .ti{font-size:19px;font-weight:800;letter-spacing:-0.5px;}
.cA .a-hd .ti span{font-size:12px;font-weight:600;color:var(--tx2);margin-left:7px;}
.cA .a-hd .bell{position:relative;}
.cA .a-hd .bell svg{width:22px;height:22px;stroke:var(--navy);fill:none;stroke-width:1.8;}
.cA .a-hd .bell .d{position:absolute;top:0;right:1px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid #fff;}
.cA .a-fl{flex:0 0 auto;display:flex;gap:7px;padding:11px 16px;overflow-x:auto;border-bottom:1px solid var(--bd);}
.cA .a-fl::-webkit-scrollbar{display:none;}
.cA .chip{flex:0 0 auto;font-size:12px;font-weight:600;padding:7px 13px;border-radius:18px;border:1px solid var(--bd2);background:#fff;color:var(--tx2);}
.cA .chip.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:700;}
.cA .arow{padding:15px 18px;border-bottom:1px solid var(--bd);position:relative;}
.cA .arow.pr{border-left:3px solid var(--red);}
.cA .arow .l1{display:flex;align-items:center;gap:7px;}
.cA .arow .pt{font-size:10px;font-weight:800;color:var(--red);background:var(--red-bg);padding:3px 7px;border-radius:5px;}
.cA .arow .nt{font-size:10px;font-weight:800;color:var(--navy);background:var(--blue-bg);padding:3px 7px;border-radius:5px;}
.cA .arow .dt{font-size:11px;color:var(--tx2);}
.cA .arow .rg{font-size:15.5px;font-weight:800;margin-top:6px;letter-spacing:-0.4px;}
.cA .arow .tags{display:flex;gap:5px;margin-top:8px;}
.cA .arow .mt{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.cA .arow .eq{font-size:11px;color:var(--tx2);}
.cA .arow .pc{font-size:15px;font-weight:800;color:var(--navy);}
.cA .arow .cd-pill{margin-top:9px;}
.cA .arow.done .body{filter:blur(2.5px);opacity:.45;}
.cA .arow.done{background:#FAFBFC;}
.cA .done-b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.cA .done-b .x{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.7);padding:8px 18px;border-radius:30px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.cA .done-b .ck{width:24px;height:24px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;}
.cA .done-b .ck svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:3;}
.cA .done-b .tt{font-size:16px;font-weight:800;color:var(--navy);letter-spacing:1px;}
.cA .fab{position:absolute;right:16px;bottom:88px;width:54px;height:54px;border-radius:27px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:27px;box-shadow:0 10px 22px rgba(0,47,108,.32);}
/* detail */
.cA .a-nav{flex:0 0 auto;height:50px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--bd);}
.cA .a-nav svg{width:22px;height:22px;stroke:var(--navy);fill:none;stroke-width:2;}
.cA .a-nav .t{flex:1;text-align:center;font-size:16px;font-weight:700;margin-right:22px;}
.cA .a-map{height:170px;}
.cA .dt-top{padding:16px 18px 4px;}
.cA .dt-top .pt{font-size:10px;font-weight:800;color:var(--red);background:var(--red-bg);padding:4px 9px;border-radius:6px;}
.cA .dt-top h2{font-size:19px;font-weight:800;margin-top:10px;letter-spacing:-0.5px;}
.cA .dt-top .m{font-size:12.5px;color:var(--tx2);margin-top:6px;}
.cA .ir{display:flex;padding:13px 18px;border-bottom:1px solid var(--bd);}
.cA .ir .k{width:74px;font-size:12.5px;color:var(--tx2);flex:0 0 auto;}
.cA .ir .v{flex:1;font-size:12.5px;font-weight:600;line-height:1.5;}
.cA .ir .pc{font-size:17px;font-weight:800;color:var(--navy);}
.cA .ir .pc small{font-size:11px;color:var(--red);font-weight:700;margin-left:8px;}
.cA .a-cta{flex:0 0 auto;padding:13px 16px 18px;border-top:1px solid var(--bd);display:flex;gap:9px;}
.cA .a-cta .btn{height:50px;font-size:14px;}
.cA .a-cta .btn-out{flex:1;} .cA .a-cta .btn-navy{flex:1.4;}

/* ============================================================
   CONCEPT B — 카드형 (soft cards, gray bg)
   ============================================================ */
.cB .screen{background:var(--bg);}
.cB .b-login{flex:1;display:flex;flex-direction:column;background:linear-gradient(165deg,var(--navy2),var(--navy) 75%);position:relative;overflow:hidden;}
.cB .b-login .glow{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.25),transparent 70%);top:-60px;right:-50px;}
.cB .b-hero{flex:0 0 auto;text-align:center;padding:46px 26px 28px;position:relative;z-index:2;}
.cB .b-hero .plate{width:96px;height:96px;margin:0 auto;}
.cB .b-hero .plate img{width:78px;height:78px;}
.cB .b-hero h1{font-size:22px;font-weight:600;color:#fff;margin-top:16px;letter-spacing:-0.6px;line-height:1.35;}
.cB .b-hero h1 b{font-weight:800;}
.cB .b-hero p{font-size:12.5px;color:rgba(255,255,255,.72);margin-top:8px;}
.cB .b-sheet{flex:1;min-height:0;background:#fff;border-radius:26px 26px 0 0;margin-top:auto;padding:24px 22px 18px;display:flex;flex-direction:column;}
.cB .fld{margin-bottom:12px;}
.cB .fld label{font-size:11.5px;font-weight:700;color:var(--tx2);display:block;margin-bottom:6px;}
.cB .fld input{width:100%;height:48px;border:none;background:var(--gray);border-radius:12px;padding:0 14px;font-size:13.5px;}
.cB .b-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--tx2);margin:5px 2px 16px;}
.cB .b-row .f{color:var(--navy);font-weight:700;}
.cB .b-sheet .btn{height:50px;font-size:15px;}
.cB .b-su{text-align:center;font-size:12.5px;color:var(--tx2);margin-top:15px;}
.cB .b-su a{color:var(--navy);font-weight:700;}
.cB .b-trust{display:flex;justify-content:center;gap:20px;margin-top:auto;padding-top:16px;}
.cB .b-trust .t{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx2);font-weight:600;}
.cB .b-trust svg{width:15px;height:15px;stroke:var(--navy);fill:none;stroke-width:1.9;stroke-linecap:round;}
/* list */
.cB .b-hd{flex:0 0 auto;background:#fff;padding:16px 18px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);}
.cB .b-hd .brand{display:flex;align-items:center;gap:8px;}
.cB .b-hd .brand img{width:25px;height:25px;}
.cB .b-hd .brand .ti{font-size:18px;font-weight:800;letter-spacing:-0.4px;}
.cB .b-hd .bell{position:relative;width:36px;height:36px;border-radius:50%;background:var(--gray);display:flex;align-items:center;justify-content:center;}
.cB .b-hd .bell svg{width:19px;height:19px;stroke:var(--navy);fill:none;stroke-width:1.8;}
.cB .b-hd .bell .d{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid #fff;}
.cB .b-fl{flex:0 0 auto;display:flex;gap:7px;padding:12px 16px;overflow-x:auto;}
.cB .b-fl::-webkit-scrollbar{display:none;}
.cB .chip{flex:0 0 auto;font-size:12px;font-weight:600;padding:8px 14px;border-radius:20px;background:#fff;color:var(--tx2);border:1px solid var(--bd);}
.cB .chip.on{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700;}
.cB .cards{flex:1;min-height:0;overflow-y:auto;padding:2px 16px 16px;display:flex;flex-direction:column;gap:12px;}
.cB .cards::-webkit-scrollbar{display:none;}
.cB .card{background:#fff;border-radius:16px;padding:15px;box-shadow:0 1px 3px rgba(2,32,71,.05),0 5px 16px rgba(2,32,71,.04);}
.cB .card.pr{box-shadow:0 0 0 1.5px var(--red),0 6px 16px rgba(220,38,38,.08);}
.cB .card .l1{display:flex;justify-content:space-between;align-items:flex-start;}
.cB .card .dt{font-size:11.5px;color:var(--tx2);}
.cB .card .rg{font-size:16px;font-weight:800;margin-top:4px;letter-spacing:-0.4px;}
.cB .pt{font-size:10px;font-weight:800;color:#fff;background:var(--red);padding:5px 9px;border-radius:14px;}
.cB .nt{font-size:10px;font-weight:800;color:var(--navy);background:var(--blue-bg);padding:5px 9px;border-radius:14px;}
.cB .card .tags{display:flex;gap:5px;margin:11px 0;}
.cB .card .mt{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--bd);padding-top:11px;}
.cB .card .eq{font-size:11.5px;color:var(--tx2);}
.cB .card .pc{font-size:16px;font-weight:800;color:var(--navy);}
.cB .card .cdwrap{display:flex;align-items:center;gap:10px;margin-top:11px;background:#FFF4ED;border-radius:10px;padding:8px 10px;}
.cB .card .cdwrap .lab{font-size:11px;font-weight:700;color:var(--amber);}
.cB .card.done{background:#F1F3F6;position:relative;overflow:hidden;}
.cB .card.done .body{filter:grayscale(1);opacity:.34;}
.cB .done-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;}
.cB .done-c .ck{width:40px;height:40px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;box-shadow:0 5px 14px rgba(0,47,108,.26);}
.cB .done-c .ck svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.6;}
.cB .done-c .tt{font-size:18px;font-weight:800;color:var(--navy);letter-spacing:1px;}
.cB .fab{position:absolute;right:18px;bottom:90px;width:56px;height:56px;border-radius:18px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 12px 24px rgba(0,47,108,.32);}
/* detail */
.cB .b-nav{flex:0 0 auto;height:50px;display:flex;align-items:center;padding:0 14px;background:#fff;}
.cB .b-nav .bk{width:34px;height:34px;border-radius:50%;background:var(--gray);display:flex;align-items:center;justify-content:center;}
.cB .b-nav svg{width:19px;height:19px;stroke:var(--navy);fill:none;stroke-width:2.2;}
.cB .b-nav .t{flex:1;text-align:center;font-size:15px;font-weight:700;margin-right:34px;}
.cB .b-body{flex:1;min-height:0;overflow-y:auto;padding:0 16px 14px;}
.cB .b-body::-webkit-scrollbar{display:none;}
.cB .b-map{height:150px;border-radius:16px;margin-top:6px;}
.cB .b-tile{background:#fff;border-radius:16px;padding:16px;margin-top:13px;box-shadow:0 1px 3px rgba(2,32,71,.05);}
.cB .b-tile .pt{display:inline-block;margin-bottom:9px;}
.cB .b-tile h2{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.cB .b-tile .m{font-size:12px;color:var(--tx2);margin-top:5px;}
.cB .amt{display:flex;justify-content:space-between;align-items:flex-end;margin-top:14px;border-top:1px solid var(--bd);padding-top:13px;}
.cB .amt .l{font-size:11px;color:var(--tx2);}
.cB .amt .b{font-size:18px;font-weight:800;color:var(--navy);letter-spacing:-0.4px;}
.cB .amt .ref{font-size:11px;color:var(--red);font-weight:700;text-align:right;}
.cB .gr{display:flex;justify-content:space-between;padding:11px 0;font-size:12.5px;border-bottom:1px solid var(--bd);gap:12px;}
.cB .gr:last-child{border-bottom:none;}
.cB .gr .k{color:var(--tx2);} .cB .gr .v{font-weight:600;text-align:right;line-height:1.5;}
.cB .b-cdtile{display:flex;align-items:center;gap:12px;background:#FFF4ED;border-radius:14px;padding:13px 15px;margin-top:13px;}
.cB .b-cdtile .x{font-size:12px;font-weight:700;color:var(--amber);line-height:1.4;}
.cB .b-cta{flex:0 0 auto;padding:12px 16px 18px;display:flex;gap:10px;background:#fff;border-top:1px solid var(--bd);}
.cB .b-cta .btn{height:52px;font-size:14px;}
.cB .b-cta .btn-out{flex:1;} .cB .b-cta .btn-navy{flex:1.4;}

/* ============================================================
   CONCEPT C — 헤더강조형 (navy brand header band)
   ============================================================ */
.cC .screen{background:var(--bg);}
.cC .c-login{flex:1;display:flex;flex-direction:column;background:var(--navy);position:relative;overflow:hidden;padding:0 26px;}
.cC .c-login .glow{position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.22),transparent 70%);bottom:-60px;left:-60px;}
.cC .c-login .hero{flex:0 0 auto;text-align:center;padding-top:56px;position:relative;z-index:2;}
.cC .c-login .plate{width:120px;height:120px;margin:0 auto;}
.cC .c-login .plate img{width:98px;height:98px;}
.cC .c-login h1{font-size:24px;font-weight:600;color:#fff;margin-top:22px;letter-spacing:-0.7px;line-height:1.35;}
.cC .c-login h1 b{font-weight:800;}
.cC .c-login p{font-size:13px;color:rgba(255,255,255,.7);margin-top:9px;}
.cC .c-form{margin-top:auto;padding-bottom:26px;position:relative;z-index:2;}
.cC .fld{margin-bottom:11px;}
.cC .fld input{width:100%;height:50px;border:none;background:rgba(255,255,255,.12);border-radius:12px;padding:0 15px;font-size:13.5px;color:#fff;}
.cC .fld input::placeholder{color:rgba(255,255,255,.55);}
.cC .c-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:rgba(255,255,255,.7);margin:7px 2px 16px;}
.cC .c-form .btn{height:52px;font-size:15px;background:#fff;color:var(--navy);box-shadow:0 8px 18px rgba(0,0,0,.2);}
.cC .c-su{text-align:center;font-size:12.5px;color:rgba(255,255,255,.7);margin-top:16px;}
.cC .c-su a{color:#fff;font-weight:700;}
/* list */
.cC .c-band{flex:0 0 auto;background:var(--navy);padding:18px 18px 20px;color:#fff;position:relative;overflow:hidden;}
.cC .c-band .glow{position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.25),transparent 70%);top:-50px;right:-40px;}
.cC .c-band .top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2;}
.cC .c-band .brand{display:flex;align-items:center;gap:8px;}
.cC .c-band .brand .plate{width:30px;height:30px;}
.cC .c-band .brand .plate img{width:24px;height:24px;}
.cC .c-band .brand span{font-size:15px;font-weight:800;}
.cC .c-band .bell{position:relative;}
.cC .c-band .bell svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:1.8;}
.cC .c-band .bell .d{position:absolute;top:0;right:1px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--navy);}
.cC .c-band .big{font-size:18px;font-weight:700;margin-top:16px;position:relative;z-index:2;letter-spacing:-0.4px;}
.cC .c-band .big b{font-weight:800;color:#7DD3FC;}
.cC .c-fl{flex:0 0 auto;display:flex;gap:7px;padding:13px 16px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--bd);}
.cC .c-fl::-webkit-scrollbar{display:none;}
.cC .chip{flex:0 0 auto;font-size:12px;font-weight:600;padding:7px 13px;border-radius:18px;background:#fff;color:var(--tx2);border:1px solid var(--bd2);}
.cC .chip.on{background:var(--blue-bg);color:var(--navy);border-color:var(--navy);font-weight:700;}
.cC .cards{flex:1;min-height:0;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:11px;}
.cC .cards::-webkit-scrollbar{display:none;}
.cC .card{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:15px;}
.cC .card.pr{border-color:var(--red);border-width:1.5px;}
.cC .card .l1{display:flex;justify-content:space-between;align-items:flex-start;}
.cC .card .dt{font-size:11.5px;color:var(--tx2);}
.cC .card .rg{font-size:15.5px;font-weight:800;margin-top:4px;letter-spacing:-0.4px;}
.cC .pt{font-size:10px;font-weight:800;color:var(--red);background:var(--red-bg);padding:4px 8px;border-radius:5px;}
.cC .nt{font-size:10px;font-weight:800;color:var(--navy);background:var(--blue-bg);padding:4px 8px;border-radius:5px;}
.cC .card .tags{display:flex;gap:5px;margin:10px 0;}
.cC .card .mt{display:flex;justify-content:space-between;align-items:center;border-top:1px dashed var(--bd);padding-top:10px;}
.cC .card .eq{font-size:11px;color:var(--tx2);}
.cC .card .pc{font-size:15px;font-weight:800;color:var(--navy);}
.cC .card .cdbar{margin-top:10px;}
.cC .cdbar .lab{display:flex;justify-content:space-between;font-size:10.5px;font-weight:700;color:var(--amber);margin-bottom:5px;}
.cC .cdbar .track{height:5px;border-radius:3px;background:#FBE4D5;overflow:hidden;}
.cC .cdbar .fill{height:100%;width:40%;background:var(--amber);border-radius:3px;}
.cC .card.done{position:relative;background:#F4F6F8;overflow:hidden;}
.cC .card.done .body{filter:grayscale(1);opacity:.34;}
.cC .done-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.cC .done-c .ck{width:38px;height:38px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;}
.cC .done-c .ck svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:2.6;}
.cC .done-c .tt{font-size:18px;font-weight:800;color:var(--navy);letter-spacing:1px;}
.cC .fab{position:absolute;right:16px;bottom:88px;width:54px;height:54px;border-radius:27px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:27px;box-shadow:0 10px 22px rgba(220,38,38,.32);}
/* detail */
.cC .c-dhead{flex:0 0 auto;background:var(--navy);color:#fff;padding:16px 18px 18px;position:relative;overflow:hidden;}
.cC .c-dhead .glow{position:absolute;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.25),transparent 70%);top:-50px;right:-30px;}
.cC .c-dhead .nav{display:flex;align-items:center;gap:10px;position:relative;z-index:2;}
.cC .c-dhead .nav svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;}
.cC .c-dhead .nav .t{font-size:15px;font-weight:700;}
.cC .c-dhead .pt{display:inline-block;margin:14px 0 8px;position:relative;z-index:2;background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:4px 9px;border-radius:6px;}
.cC .c-dhead h2{font-size:20px;font-weight:800;position:relative;z-index:2;letter-spacing:-0.5px;}
.cC .c-dhead .m{font-size:12.5px;color:rgba(255,255,255,.75);margin-top:6px;position:relative;z-index:2;}
.cC .c-body{flex:1;min-height:0;overflow-y:auto;padding:14px 16px;}
.cC .c-body::-webkit-scrollbar{display:none;}
.cC .c-map{height:130px;border-radius:14px;}
.cC .c-cd{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #FBE4D5;border-radius:14px;padding:13px 15px;margin-top:13px;}
.cC .c-cd .x{font-size:12px;font-weight:700;color:var(--amber);line-height:1.4;}
.cC .amt{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:15px;margin-top:13px;}
.cC .amt .l{font-size:11px;color:var(--tx2);}
.cC .amt .b{font-size:19px;font-weight:800;color:var(--navy);margin-top:3px;letter-spacing:-0.5px;}
.cC .amt .ref{font-size:11.5px;color:var(--tx2);margin-top:10px;border-top:1px solid var(--bd);padding-top:10px;display:flex;justify-content:space-between;}
.cC .amt .ref b{color:var(--red);font-weight:800;}
.cC .grp{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:4px 15px;margin-top:13px;}
.cC .gr{display:flex;justify-content:space-between;padding:11px 0;font-size:12.5px;border-bottom:1px solid var(--bd);gap:12px;}
.cC .gr:last-child{border-bottom:none;}
.cC .gr .k{color:var(--tx2);} .cC .gr .v{font-weight:600;text-align:right;line-height:1.5;}
.cC .c-cta{flex:0 0 auto;padding:12px 16px 18px;display:flex;gap:9px;background:#fff;border-top:1px solid var(--bd);}
.cC .c-cta .btn{height:50px;font-size:14px;}
.cC .c-cta .btn-out{flex:1;} .cC .c-cta .btn-red{flex:1.4;}
</style>
</head>
